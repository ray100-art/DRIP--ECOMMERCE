<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRIP — Wishlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --white: #fafaf8; --cream: #f5f0e8;
      --red: #c8102e; --gray-100: #f4f4f4; --gray-200: #e8e8e8;
      --gray-500: #888; --gray-700: #444; --green: #16a34a; --gold: #c9a84c;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--gray-100); color: var(--black); min-height: 100vh; }

    nav { background: var(--black); height: 64px; display: flex; align-items: center; padding: 0 40px; position: sticky; top: 0; z-index: 100; }
    .nav-inner { width: 100%; max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.1em; color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; font-weight: 500; transition: color .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-icon-btn { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 18px; cursor: pointer; transition: color .2s; position: relative; }
    .nav-icon-btn:hover { color: var(--white); }
    .cart-count { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; border-radius: 50%; background: var(--red); color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

    .page-header { background: var(--black); padding: 48px 40px 56px; }
    .page-header-inner { max-width: 1280px; margin: 0 auto; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 0.03em; color: var(--white); line-height: 1; }
    .page-subtitle { font-size: 15px; color: rgba(255,255,255,0.4); margin-top: 8px; }
    .wishlist-count-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--red); color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 12px; }

    .layout { max-width: 1280px; margin: 0 auto; padding: 40px; display: grid; grid-template-columns: 1fr 340px; gap: 32px; align-items: start; }

    /* WISHLIST GRID */
    .wishlist-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .wishlist-toolbar-title { font-size: 15px; font-weight: 700; }
    .clear-all-btn { font-size: 13px; color: var(--gray-500); background: none; border: none; cursor: pointer; text-decoration: underline; transition: color .2s; }
    .clear-all-btn:hover { color: var(--red); }

    .wishlist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .wish-card { background: var(--white); border-radius: 16px; overflow: hidden; transition: all .3s; position: relative; }
    .wish-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
    .wish-img { aspect-ratio: 3/4; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; cursor: pointer; }
    .wish-remove { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gray-500); transition: all .2s; }
    .wish-remove:hover { background: var(--red); color: #fff; }
    .wish-badge { position: absolute; top: 12px; left: 12px; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; background: var(--red); color: #fff; }
    .wish-info { padding: 14px 16px; }
    .wish-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wish-cat { font-size: 11px; color: var(--gray-500); margin-bottom: 10px; }
    .wish-price-row { display: flex; align-items: center; justify-content: space-between; }
    .wish-price { font-size: 15px; font-weight: 700; }
    .wish-old { font-size: 12px; color: var(--gray-500); text-decoration: line-through; margin-left: 6px; }
    .wish-add-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--black); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background .2s; }
    .wish-add-btn:hover { background: var(--red); }

    /* EMPTY STATE */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 32px; background: var(--white); border-radius: 20px; }
    .empty-icon { font-size: 80px; margin-bottom: 20px; opacity: 0.3; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; margin-bottom: 10px; }
    .empty-sub { font-size: 15px; color: var(--gray-500); margin-bottom: 28px; }
    .shop-btn { padding: 14px 36px; background: var(--black); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background .2s; text-decoration: none; display: inline-block; }
    .shop-btn:hover { background: var(--red); }

    /* SIDEBAR SUMMARY */
    .summary-card { background: var(--white); border-radius: 16px; padding: 28px; position: sticky; top: 88px; box-shadow: 0 2px 16px rgba(0,0,0,0.04); }
    .summary-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.05em; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--gray-200); }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
    .summary-row .label { color: var(--gray-500); }
    .summary-divider { height: 1px; background: var(--gray-200); margin: 16px 0; }
    .summary-total { font-size: 18px; font-weight: 700; }
    .add-all-btn { width: 100%; padding: 16px; background: var(--red); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all .2s; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .add-all-btn:hover { background: #9e0c24; transform: translateY(-2px); }
    .add-all-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .shop-more-link { display: block; text-align: center; margin-top: 14px; font-size: 13px; color: var(--gray-500); text-decoration: none; transition: color .2s; }
    .shop-more-link:hover { color: var(--black); }

    /* RECENTLY VIEWED */
    .recent-section { max-width: 1280px; margin: 0 auto; padding: 0 40px 80px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.05em; margin-bottom: 24px; }
    .recent-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .recent-card { background: var(--white); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all .2s; }
    .recent-card:hover { transform: translateY(-4px); }
    .recent-img { aspect-ratio: 1; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 44px; }
    .recent-info { padding: 12px 14px; }
    .recent-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .recent-price { font-size: 13px; font-weight: 700; }

    /* TOAST */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--black); color: var(--white); padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; z-index: 200; transition: transform .4s cubic-bezier(.34,1.56,.64,1); }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast i { color: var(--green); font-size: 18px; }

    @media (max-width: 1024px) { .layout { grid-template-columns: 1fr; } .summary-card { position: static; } .wishlist-grid { grid-template-columns: repeat(2, 1fr); } .recent-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .wishlist-grid { grid-template-columns: 1fr 1fr; } .page-title { font-size: 52px; } .layout { padding: 24px 16px; } .page-header { padding: 32px 20px 40px; } .recent-section { padding: 0 16px 60px; } nav { padding: 0 20px; } }
  
    body { animation: pageIn .35s ease both; }
    @keyframes pageIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @media (min-width: 769px) {
      #hamburgerBtn { display: none !important; }
      .mobile-menu { display: none !important; }
      .bottom-nav { display: none !important; }
    }
    .mobile-menu { position:fixed; inset:0; z-index:500; background:#0a0a0a; display:flex; flex-direction:column; padding:80px 32px 40px; transform:translateX(100%); transition:transform .35s cubic-bezier(0.22,1,0.36,1); }
    .mobile-menu.open { transform:translateX(0); }
    .mobile-menu-link { font-family:'Bebas Neue',sans-serif; font-size:40px; letter-spacing:0.06em; color:#fff; text-decoration:none; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:space-between; transition:color .2s; }
    .mobile-menu-link:hover { color:#b8942a; }
    .mobile-menu-close { position:absolute; top:20px; right:20px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; }
    .bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; z-index:300; background:#fff; border-top:1px solid #e8e8e8; padding:8px 0 max(8px,env(safe-area-inset-bottom)); box-shadow:0 -4px 20px rgba(0,0,0,0.08); }
    .bottom-nav-inner { display:flex; justify-content:space-around; align-items:center; }
    .bottom-nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; color:#888; text-decoration:none; font-size:10px; font-weight:600; letter-spacing:0.05em; padding:4px 8px; transition:color .2s; background:none; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; }
    .bottom-nav-item i { font-size:20px; }
    .bottom-nav-item.active { color:#0a0a0a; }
    .bottom-nav-item.active i { color:#c8102e; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="shop.html" class="nav-logo">DRIP <span class="nav-logo-dot"></span></a>
    <div class="nav-links">
      <a href="shop.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="orders.html">My Orders</a>
      <a href="profile.html">Profile</a>
      <a href="wishlist.html" class="active">Wishlist</a>
    </div>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="window.location.href='wishlist.html'"><i class="bi bi-heart-fill" style="color:var(--red)"></i></button>
      <button class="nav-icon-btn" id="cartBtn" onclick="window.location.href='checkout.html'"><i class="bi bi-bag"></i><div class="cart-count" id="cartCount">0</div></button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div class="page-title">Wishlist</div>
    <div class="page-subtitle">Your saved pieces — waiting for you.</div>
    <div class="wishlist-count-badge"><i class="bi bi-heart-fill"></i> <span id="wlCountBadge">0 items saved</span></div>
  </div>
</div>

<div class="layout">
  <div>
    <div class="wishlist-toolbar">
      <div class="wishlist-toolbar-title" id="wlToolbarTitle">Your Wishlist</div>
      <button class="clear-all-btn" onclick="clearAll()">Clear all</button>
    </div>
    <div class="wishlist-grid" id="wishlistGrid"></div>
  </div>

  <div class="summary-card">
    <div class="summary-title">Summary</div>
    <div class="summary-row"><span class="label">Items saved</span><span id="sumCount">0</span></div>
    <div class="summary-row"><span class="label">Total value</span><span id="sumTotal">KES 0</span></div>
    <div class="summary-divider"></div>
    <div class="summary-row summary-total"><span>If you buy all</span><span id="sumGrand">KES 0</span></div>
    <button class="add-all-btn" id="addAllBtn" onclick="addAllToCart()"><i class="bi bi-bag-plus"></i> Add All to Bag</button>
    <a href="products.html" class="shop-more-link">Continue Shopping →</a>
  </div>
</div>

<div class="recent-section">
  <div class="section-title">Recently Viewed</div>
  <div class="recent-grid" id="recentGrid"></div>
</div>

<div class="toast" id="toast"><i class="bi bi-check-circle-fill"></i><span id="toastMsg">Done!</span></div>

<script>

  const KES_RATE = 130;
  function toKES(usd) { return Math.round(usd * KES_RATE); }
  function fmtKES(n) { return 'KES ' + n.toLocaleString('en-KE'); }

  const ALL_PRODUCTS = [
    {id:1,  name:'Floral Wrap Dress',   cat:'Women',       price:89,  oldPrice:null, badge:'NEW',  emoji:'👗'},
    {id:2,  name:'Wide Leg Trousers',   cat:'Women',       price:72,  oldPrice:95,   badge:'SALE', emoji:'👖'},
    {id:3,  name:'Silk Blouse',         cat:'Women',       price:95,  oldPrice:null, badge:'HOT',  emoji:'👚'},
    {id:4,  name:'Knit Cardigan',       cat:'Women',       price:110, oldPrice:null, badge:'NEW',  emoji:'🧶'},
    {id:5,  name:'Mini Skirt',          cat:'Women',       price:58,  oldPrice:75,   badge:'SALE', emoji:'👗'},
    {id:6,  name:'Slim Fit Chinos',     cat:'Men',         price:85,  oldPrice:null, badge:'NEW',  emoji:'👖'},
    {id:7,  name:'Leather Jacket',      cat:'Men',         price:295, oldPrice:null, badge:'HOT',  emoji:'🧥'},
    {id:8,  name:'Oxford Shirt',        cat:'Men',         price:68,  oldPrice:null, badge:'NEW',  emoji:'👔'},
    {id:9,  name:'Chunky Sneakers',     cat:'Shoes',       price:149, oldPrice:189,  badge:'SALE', emoji:'👟'},
    {id:10, name:'Leather Boots',       cat:'Shoes',       price:225, oldPrice:null, badge:'HOT',  emoji:'👢'},
    {id:11, name:'Leather Tote Bag',    cat:'Accessories', price:178, oldPrice:null, badge:'NEW',  emoji:'👜'},
    {id:12, name:'Gold Chain Necklace', cat:'Accessories', price:89,  oldPrice:null, badge:'HOT',  emoji:'📿'},
  ];

  const RECENT = [
    {id:3, name:'Silk Blouse',      price:95,  emoji:'👚'},
    {id:7, name:'Leather Jacket',   price:295, emoji:'🧥'},
    {id:9, name:'Chunky Sneakers',  price:149, emoji:'👟'},
    {id:11,name:'Leather Tote Bag', price:178, emoji:'👜'},
  ];

  function getWishlist() { return JSON.parse(sessionStorage.getItem('drip-wishlist') || '[]'); }
  function saveWishlist(wl) { sessionStorage.setItem('drip-wishlist', JSON.stringify(wl)); }

  // Seed some wishlist items if empty
  if (!sessionStorage.getItem('drip-wishlist')) {
    saveWishlist([1, 3, 7, 9]);
  }

  function render() {
    const wl = getWishlist();
    const items = ALL_PRODUCTS.filter(p => wl.includes(p.id));
    const total = items.reduce((s,p) => s + p.price, 0);

    document.getElementById('wlCountBadge').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '') + ' saved';
    document.getElementById('wlToolbarTitle').textContent = 'Your Wishlist (' + items.length + ')';
    document.getElementById('sumCount').textContent = items.length;
    document.getElementById('sumTotal').textContent = fmtKES(toKES(total));
    document.getElementById('sumGrand').textContent = fmtKES(toKES(total));
    document.getElementById('addAllBtn').disabled = items.length === 0;
    updateCartCount();

    if (items.length === 0) {
      document.getElementById('wishlistGrid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🤍</div>
          <div class="empty-title">Nothing Saved Yet</div>
          <div class="empty-sub">Start adding pieces you love — they'll be waiting here for you.</div>
          <a href="products.html" class="shop-btn">Browse the Collection</a>
        </div>`;
    } else {
      document.getElementById('wishlistGrid').innerHTML = items.map(p => `
        <div class="wish-card" id="wish-${p.id}">
          <div class="wish-img" onclick="window.location.href='product.html?id=${p.id}'">
            ${p.emoji}
            <button class="wish-remove" onclick="event.stopPropagation();removeFromWishlist(${p.id})" title="Remove"><i class="bi bi-x-lg"></i></button>
            <div class="wish-badge">${p.badge}</div>
          </div>
          <div class="wish-info">
            <div class="wish-name">${p.name}</div>
            <div class="wish-cat">${p.cat}</div>
            <div class="wish-price-row">
              <div><span class="wish-price">$${p.price}</span>${p.oldPrice ? `<span class="wish-old">$${p.oldPrice}</span>` : ''}</div>
              <button class="wish-add-btn" onclick="addItemToCart(${p.id})" title="Add to bag"><i class="bi bi-bag-plus"></i></button>
            </div>
          </div>
        </div>`).join('');
    }
  }

  function removeFromWishlist(id) {
    const wl = getWishlist().filter(i => i !== id);
    saveWishlist(wl);
    const card = document.getElementById('wish-' + id);
    if (card) { card.style.opacity = '0'; card.style.transform = 'scale(0.9)'; card.style.transition = 'all .3s'; setTimeout(render, 300); }
    showToast('Removed from wishlist');
  }

  function clearAll() {
    if (!confirm('Clear your entire wishlist?')) return;
    saveWishlist([]);
    render();
    showToast('Wishlist cleared');
  }

  function addItemToCart(id) {
    const p = ALL_PRODUCTS.find(x => x.id === id);
    if (!p) return;
    const cart = JSON.parse(sessionStorage.getItem('drip-cart') || '[]');
    const ex = cart.find(i => i.id === id);
    if (ex) ex.qty++; else cart.push({id, name:p.name, price:p.price, emoji:p.emoji, qty:1});
    sessionStorage.setItem('drip-cart', JSON.stringify(cart));
    updateCartCount();
    showToast(p.name + ' added to bag!');
  }

  function addAllToCart() {
    const wl = getWishlist();
    wl.forEach(id => addItemToCart(id));
    showToast('All items added to your bag!');
  }

  function updateCartCount() {
    const cart = JSON.parse(sessionStorage.getItem('drip-cart') || '[]');
    document.getElementById('cartCount').textContent = cart.reduce((s,i) => s + i.qty, 0);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.getElementById('recentGrid').innerHTML = RECENT.map(p => `
    <div class="recent-card" onclick="window.location.href='product.html?id=${p.id}'">
      <div class="recent-img">${p.emoji}</div>
      <div class="recent-info"><div class="recent-name">${p.name}</div><div class="recent-price">${fmtKES(toKES(p.price))}</div></div>
    </div>`).join('');

  render();
</script>

<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-menu-close" onclick="toggleMobileMenu()"><i class="bi bi-x"></i></button>
  <a href="shop.html"     class="mobile-menu-link">Home      <i class="bi bi-chevron-right" style="font-size:20px"></i></a>
  <a href="products.html" class="mobile-menu-link">Shop      <i class="bi bi-chevron-right" style="font-size:20px"></i></a>
  <a href="orders.html"   class="mobile-menu-link">My Orders <i class="bi bi-chevron-right" style="font-size:20px"></i></a>
  <a href="wishlist.html" class="mobile-menu-link">Wishlist  <i class="bi bi-chevron-right" style="font-size:20px"></i></a>
  <a href="profile.html"  class="mobile-menu-link">Profile   <i class="bi bi-chevron-right" style="font-size:20px"></i></a>
</div>
<div class="bottom-nav" id="bottomNav">
  <div class="bottom-nav-inner">
    <a href="shop.html"     class="bottom-nav-item"><i class="bi bi-house-fill"></i>Home</a>
    <a href="products.html" class="bottom-nav-item"><i class="bi bi-grid-fill"></i>Shop</a>
    <a href="orders.html"   class="bottom-nav-item"><i class="bi bi-truck"></i>Orders</a>
    <a href="wishlist.html" class="bottom-nav-item"><i class="bi bi-heart-fill"></i>Wishlist</a>
    <a href="profile.html"  class="bottom-nav-item"><i class="bi bi-person-fill"></i>Profile</a>
  </div>
</div>
</body>
</html>
